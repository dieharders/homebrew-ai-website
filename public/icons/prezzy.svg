<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Background rounded square (orange-100) -->
  <rect width="64" height="64" rx="10" fill="#ffedd5"/>
  <!-- Icon content scaled to 70% centered (24x24 -> ~44.8px, offset ~9.6) -->
  <g transform="translate(9.6, 9.6) scale(1.867)">
    <!-- Screen/board -->
    <rect
      x="3" y="2" width="18" height="14" rx="2"
      fill="#fb923c"
      stroke="#1a1a1a"
      stroke-width="1.2"
      stroke-linejoin="round"
    />
    <!-- Stand -->
    <line x1="12" y1="16" x2="12" y2="20" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="8" y1="20" x2="16" y2="20" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Eyes -->
    <circle cx="9" cy="8" r="1.4" fill="#1a1a1a"/>
    <circle cx="15" cy="8" r="1.4" fill="#1a1a1a"/>
    <!-- Eye shine -->
    <circle cx="9.5" cy="7.5" r="0.5" fill="white"/>
    <circle cx="15.5" cy="7.5" r="0.5" fill="white"/>
    <!-- Smile -->
    <path
      d="M9.5 12Q12 14 14.5 12"
      fill="none"
      stroke="#1a1a1a"
      stroke-width="1.2"
      stroke-linecap="round"
    />
  </g>
</svg>
